<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SahayakGov</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header class="panel-header">
    <img height="20" width="20" src="../icons/icon-48.png" alt="Sahayak" />
    <span>SahayakGov</span>
  </header>

  <main class="panel-body">
    <div class="section-header">नागरिक प्रोफ़ाइल (Sahayak से)</div>
    <div id="panelCitizenRows" class="rows"></div>

    <div class="action-buttons">
      <button class="btn fill" id="autofillBtn">⚡ Auto-Fill करें</button>
      <button class="btn outline" id="validateBtn">✔️ जाँचे</button>
    </div>

    <div id="panelStatus" class="status"></div>

    <section class="risk-section" id="panelRiskSection">
      <div class="risk-row">
        <span>जोखिम स्तर:</span>
        <span class="risk-badge-sm" id="panelRiskBadge"></span>
      </div>
    </section>

    <section class="crosscheck-errors" id="panelErrorSection">
      <div class="errors-title">अपात्रता कारक:</div>
      <div id="panelErrors"></div>
    </section>

    <button id="refreshBtn" class="refresh-btn">🔄 डेटा रिफ्रेश करें</button>

    <div id="chatbotContainer" class="chat-wrap">
      <div class="chat-title">Sahayak ChatBot</div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-row">
        <button id="chatMicBtn" class="chat-btn">🎤</button>
        <input type="text" id="chatInput" placeholder="पूछें..." class="chat-input" />
        <button id="chatSendBtn" class="chat-btn">➤</button>
      </div>
    </div>
  </main>

  <script src="panel.js"></script>
</body>
</html>
